name: CI / Publish

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_WEB_IMAGE }}

      - name: Notify Feishu
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_DEPLOY_WEBHOOK }}
          STATUS: ${{ job.status }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$FEISHU_WEBHOOK" ]; then exit 0; fi
          COLOR=$([ "$STATUS" = "success" ] && echo "green" || echo "red")
          EMOJI=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          curl -s -X POST "$FEISHU_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"$EMOJI game-tracker-public CI $STATUS\\n${SHA:0:7}\"}}"
